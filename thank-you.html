<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>You're Registered — One Click Digital</title>
<meta name="description" content="You're registered for the One Click Digital SEO Giveaway Webinar. Add it to your calendar and show up live to win $52,800 in SEO." />
<meta property="og:title" content="You're Registered — One Click Digital SEO Giveaway" />
<meta property="og:description" content="Your spot is confirmed. Add the webinar to your calendar and show up live to win $52,800 in SEO." />
<meta property="og:type" content="website" />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" type="image/png" href="logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --purple:#7B2CBF;
  --purple-light:#9333EA;
  --purple-bg:rgba(123,44,191,0.07);
  --purple-border:rgba(123,44,191,0.18);
  --black:#111111;
  --grey:#555555;
  --light-grey:#888888;
  --border:#e8e8e8;
  --bg:#ffffff;
  --bg2:#f7f7f7;
  --bg3:#f0f0f0;
  --green:#16a34a;
  --green-bg:rgba(22,163,74,0.08);
  --green-border:rgba(22,163,74,0.2);
  --red:#dc2626;
  --text:#1a1a1a;
}
html{scroll-behavior:smooth;}
body{
  font-family:'Poppins',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  line-height:1.6;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;font-weight:400;
}
h1,h2,h3,h4{font-weight:700;line-height:1.1;letter-spacing:-0.02em;text-wrap:balance;}
p{text-wrap:pretty;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:0;background:none;}

.wrap{width:100%;max-width:680px;margin:0 auto;padding:0 24px;}
.wrap-wide{width:100%;max-width:960px;margin:0 auto;padding:0 24px;}
@media(max-width:600px){.wrap,.wrap-wide{padding:0 16px;}}

/* ── TOPBAR ── */
.topbar{border-bottom:1px solid var(--border);background:white;position:sticky;top:0;z-index:90;}
.topbar-inner{max-width:960px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;}
.logo{display:flex;align-items:center;gap:9px;}
.logo-mark{width:28px;height:28px;background:var(--purple);border-radius:6px;display:grid;place-items:center;color:white;font-weight:800;font-size:16px;letter-spacing:-0.05em;}
.logo-text{font-weight:800;font-size:15px;letter-spacing:0.04em;color:var(--black);text-transform:uppercase;}

/* ── HERO ── */
.hero{padding:64px 0 60px;text-align:center;border-bottom:1px solid var(--border);}
.confirmed-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--green-bg);border:1px solid var(--green-border);
  border-radius:999px;padding:9px 22px;
  font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  color:var(--green);margin-bottom:24px;
}
.confirmed-badge .tick{
  width:20px;height:20px;border-radius:50%;background:var(--green);
  display:grid;place-items:center;color:white;font-size:12px;font-weight:800;flex-shrink:0;
}
.hero h1{font-size:clamp(2rem,4vw,3rem);font-weight:800;color:var(--black);max-width:22ch;margin:0 auto 18px;}
.hero h1 em{font-style:normal;color:var(--purple);}
.hero-sub{font-size:1.1rem;color:var(--grey);max-width:52ch;margin:0 auto 28px;line-height:1.75;}
.hero-sub strong{color:var(--black);}
.prize-reminder{
  display:inline-flex;align-items:center;gap:16px;
  background:var(--purple-bg);border:1px solid var(--purple-border);
  border-radius:14px;padding:18px 26px;
  font-size:1rem;color:var(--purple);font-weight:600;
  max-width:520px;margin:0 auto;
}
.prize-reminder-val{font-size:1.3rem;font-weight:800;color:var(--purple);}
.prize-reminder-divider{width:1px;height:36px;background:var(--purple-border);}

/* ── SECTIONS ── */
.section{padding:88px 0;border-top:1px solid var(--border);}
@media(max-width:600px){.section{padding:60px 0;}}
.section-title{font-size:clamp(1.8rem,3.2vw,2.5rem);text-align:center;margin-bottom:14px;color:var(--black);}
.section-sub{text-align:center;color:var(--grey);font-size:1rem;max-width:52ch;margin:0 auto;line-height:1.75;}

/* ── CALENDAR ── */
.calendar-section{background:var(--bg2);}
.webinar-info{
  display:flex;justify-content:center;align-items:center;gap:24px;flex-wrap:wrap;
  margin:24px 0 32px;font-size:1rem;color:var(--grey);
}
.webinar-info-item{display:flex;align-items:center;gap:6px;font-weight:500;}
.webinar-info-item strong{color:var(--black);}
.cal-buttons{display:flex;flex-direction:column;gap:12px;max-width:440px;margin:0 auto;}
.cal-btn{
  display:flex;align-items:center;gap:14px;
  padding:18px 24px;border-radius:12px;
  border:1.5px solid var(--border);background:white;
  font-weight:600;font-size:1rem;color:var(--black);
  transition:border-color .15s,box-shadow .15s,transform .1s;
  cursor:pointer;text-align:left;width:100%;
  font-family:'Poppins',sans-serif;
}
.cal-btn:hover{border-color:var(--purple);box-shadow:0 4px 14px rgba(123,44,191,0.12);transform:translateY(-1px);}
.cal-icon{width:36px;height:36px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;font-size:18px;}
.cal-btn.google .cal-icon{background:#e8f5e9;}
.cal-btn.outlook .cal-icon{background:#e8eaf6;}
.cal-btn.apple .cal-icon{background:#f5f5f5;}
.cal-btn.ical .cal-icon{background:#fff3e0;}
.cal-label{display:flex;flex-direction:column;}
.cal-label span{font-size:0.75rem;color:var(--light-grey);font-weight:400;margin-top:1px;}
.sms-note{
  text-align:center;margin-top:18px;font-size:0.82rem;color:var(--light-grey);
  background:white;border:1px solid var(--border);border-radius:8px;padding:12px 16px;
}

/* ── VSL ── */
.vsl-frame{
  position:relative;aspect-ratio:16/7;
  border-radius:14px;overflow:hidden;
  background:#1a1a1a;
  box-shadow:0 16px 48px -8px rgba(0,0,0,0.2);
  cursor:pointer;margin-top:28px;
  border:1px solid #e0e0e0;
}
.vsl-stripes{
  position:absolute;inset:0;
  background:
    radial-gradient(55% 50% at 50% 40%,rgba(123,44,191,0.35) 0%,transparent 65%),
    repeating-linear-gradient(45deg,#1c1c1c 0 16px,#181818 16px 32px);
}
.vsl-tag{
  position:absolute;top:12px;left:12px;z-index:3;
  background:rgba(0,0,0,0.7);color:rgba(180,120,255,0.9);
  padding:5px 10px;border-radius:5px;
  font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  font-family:ui-monospace,Menlo,monospace;border:1px solid rgba(123,44,191,0.3);
}
.vsl-center{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:24px;text-align:center;
}
.vsl-play{
  width:72px;height:72px;border-radius:50%;
  background:white;color:var(--purple);
  display:grid;place-items:center;border:0;
  box-shadow:0 10px 30px rgba(0,0,0,0.3),0 0 0 8px rgba(255,255,255,0.08);
  transition:transform .2s;
}
.vsl-play:hover{transform:scale(1.06);}
.vsl-play svg{margin-left:5px;}
.vsl-caption{color:white;font-weight:600;font-size:clamp(13px,1.1vw,16px);max-width:44ch;line-height:1.4;}
.vsl-runtime{color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:500;font-family:ui-monospace,Menlo,monospace;}
.vsl-playing{position:absolute;inset:0;display:grid;place-items:center;background:#050505;}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:22px 0;background:var(--bg);}
.footer-inner{
  max-width:960px;margin:0 auto;padding:0 24px;
  display:flex;justify-content:center;align-items:center;
  gap:16px;flex-wrap:wrap;flex-direction:column;text-align:center;
}
.footer-copy{font-size:0.73rem;color:#aaa;}
.footer-links{display:flex;gap:18px;}
.footer-links a{font-size:0.73rem;color:#aaa;transition:color .15s;}
.footer-links a:hover{color:var(--grey);}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp .5s ease forwards;}
.d1{animation-delay:.06s;opacity:0;}.d2{animation-delay:.16s;opacity:0;}
.d3{animation-delay:.28s;opacity:0;}.d4{animation-delay:.42s;opacity:0;}
</style>
</head>
<body>
<noscript><p style="padding:20px;text-align:center;font-family:sans-serif;">Please enable JavaScript to view this page.</p></noscript>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script>
'use strict';

var useState = React.useState;
var h = React.createElement;
var F = React.Fragment;

// ── WEBINAR DETAILS — update these before launch ──
var WEBINAR_DATE_STR = 'Wednesday, 21 May 2026 at 7:00 PM AEST';
var WEBINAR_PLATFORM = 'Zoom (link sent to your email)';
var GOOGLE_CAL_URL   = 'https://calendar.google.com/calendar/render?action=TEMPLATE&text=One+Click+Digital+SEO+Webinar&details=Join+the+live+SEO+giveaway+webinar+%E2%80%94+attend+live+to+win+%2452%2C800+in+SEO.&dates=20260521T090000Z/20260521T110000Z';
var OUTLOOK_URL      = 'https://outlook.live.com/calendar/0/deeplink/compose?subject=One+Click+Digital+SEO+Webinar&startdt=2026-05-21T19:00:00&enddt=2026-05-21T21:00:00&body=Attend+live+to+win+%2452%2C800+in+SEO.';
var ICAL_CONTENT     = 'BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//One Click Digital//SEO Webinar//EN\nBEGIN:VEVENT\nSUMMARY:One Click Digital SEO Giveaway Webinar\nDTSTART:20260521T090000Z\nDTEND:20260521T110000Z\nDESCRIPTION:Live SEO giveaway webinar — attend live to enter the $52\\,800 Grand Prize draw.\nEND:VEVENT\nEND:VCALENDAR';

// ── TOPBAR ──
function TopBar() {
  return h('div', {className: 'topbar'},
    h('div', {className: 'topbar-inner'})
  );
}

// ── HERO ──
function Hero() {
  return h('section', {className: 'hero'},
    h('div', {className: 'wrap fu d1'},
      h('div', {className: 'confirmed-badge'},
        h('span', {className: 'tick'}, '✓'),
        "You're registered. Check your inbox for confirmation."
      ),
      h('h1', null,
        "You're In. Now ",
        h('em', null, 'Add It to Your Calendar'),
        ' So You Don\'t Miss Out.'
      ),
      h('p', {className: 'hero-sub'},
        'Your spot at the webinar is confirmed. The Grand Prize is drawn ',
        h('strong', null, 'live on the night'),
        ' — you must be on the call to win. Lock it in your calendar now and watch the video below.'
      ),
      h('div', {className: 'prize-reminder fu d2'},
        h('div', null,
          h('div', {className: 'prize-reminder-val'}, '$52,800'),
          h('div', {style: {fontSize: '0.72rem', color: 'var(--purple)', opacity: .75, marginTop: 2}}, 'Grand Prize Value')
        ),
        h('div', {className: 'prize-reminder-divider'}),
        h('div', {style: {fontSize: '0.88rem', lineHeight: 1.5, textAlign: 'left'}},
          '12 Months of SEO Free — Winner drawn ',
          h('strong', null, 'LIVE'),
          ' on the webinar. You must attend live to win.'
        )
      )
    )
  );
}

// ── CALENDAR ──
function CalendarSection() {
  function downloadIcal() {
    var blob = new Blob([ICAL_CONTENT], {type: 'text/calendar'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'One-Click-SEO-Webinar.ics';
    a.click();
    URL.revokeObjectURL(url);
  }

  return h('section', {className: 'section calendar-section'},
    h('div', {className: 'wrap'},
      h('h2', {className: 'section-title'}, "Lock It In Your Calendar Now — Before You Forget."),
      h('p', {className: 'section-sub'}, "The prize is drawn live on the night. If you're not on the call, you can't win. Add the webinar to your calendar now."),
      h('div', {className: 'webinar-info'},
        h('div', {className: 'webinar-info-item'}, 'Date: ', h('strong', null, WEBINAR_DATE_STR)),
        h('div', {className: 'webinar-info-item'}, 'Platform: ', h('strong', null, WEBINAR_PLATFORM))
      ),
      h('div', {className: 'cal-buttons'},
        h('a', {href: GOOGLE_CAL_URL, target: '_blank', rel: 'noopener noreferrer', className: 'cal-btn google'},
          h('div', {className: 'cal-icon'},
            h('svg', {width: 24, height: 24, viewBox: '0 0 48 48', xmlns: 'http://www.w3.org/2000/svg'},
              h('path', {fill: '#EA4335', d: 'M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z'}),
              h('path', {fill: '#4285F4', d: 'M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z'}),
              h('path', {fill: '#FBBC05', d: 'M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z'}),
              h('path', {fill: '#34A853', d: 'M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z'})
            )
          ),
          h('div', {className: 'cal-label'}, 'Add to Google Calendar', h('span', null, 'Opens Google Calendar in a new tab'))
        )
      ),
      h('p', {className: 'sms-note'}, "We'll also send reminder emails and SMS — so you don't miss the live draw.")
    )
  );
}

// ── VSL ──
function VSLSection() {
  var s = useState(true);
  var playing = s[0], setPlaying = s[1];

  return h('section', {className: 'section'},
    h('div', {className: 'wrap-wide'},
      h('h2', {className: 'section-title'}, 'Watch This Before the Webinar.'),
      h('p', {className: 'section-sub'}, '2–3 minutes. Explains exactly why attending live matters — and how to boost your chances of winning.'),
      h('div', {className: 'vsl-frame', onClick: function() { setPlaying(true); }},
        playing
          ? h('div', {className: 'vsl-playing'},
              h('iframe', {src: 'https://www.youtube.com/embed/cpFOTYXERYA?autoplay=1&mute=0&rel=0&modestbranding=1&playsinline=1', style: {width: '100%', height: '100%', border: 0}, allow: 'autoplay; encrypted-media; fullscreen', allowFullScreen: true, title: 'One Click Digital SEO Giveaway - Thank You'})
            )
          : h(F, null,
              h('div', {className: 'vsl-stripes'}),
              h('span', {className: 'vsl-tag'}, 'VSL · 2–3 min · Watch Before the Webinar'),
              h('div', {className: 'vsl-center'},
                h('button', {className: 'vsl-play', 'aria-label': 'Play video'},
                  h('svg', {width: 26, height: 26, viewBox: '0 0 24 24', fill: 'currentColor'},
                    h('path', {d: 'M8 5v14l11-7z'})
                  )
                ),
                h('p', {className: 'vsl-caption'}, 'Why attending live matters — and the one thing that gives you the best chance of winning the $52,800 Grand Prize.'),
                h('p', {className: 'vsl-runtime'}, '2–3 min · One Click Digital')
              )
            )
      )
    )
  );
}

// ── SURVEY FORM ──
function SurveyForm() {
  var nameState = useState('');
  var name = nameState[0], setName = nameState[1];
  var answerState = useState('');
  var answer = answerState[0], setAnswer = answerState[1];
  var submittedState = useState(false);
  var submitted = submittedState[0], setSubmitted = submittedState[1];
  var loadingState = useState(false);
  var loading = loadingState[0], setLoading = loadingState[1];

  var inputStyle = {
    width: '100%', padding: '14px 16px', borderRadius: 10,
    border: '1.5px solid var(--border)', fontSize: '1rem',
    fontFamily: "'Poppins',sans-serif", outline: 'none',
    transition: 'border-color .15s', background: '#fff', color: 'var(--black)'
  };
  var labelStyle = {
    display: 'block', fontWeight: 700, fontSize: '0.95rem',
    marginBottom: 8, color: 'var(--black)'
  };

  function onSubmit(e) {
    e.preventDefault();
    setLoading(true);
    fetch('https://hooks.zapier.com/hooks/catch/12454565/4yhejsp/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name: name, enquiry_struggle: answer, source: 'thank-you-survey'})
    }).catch(function() {}).finally(function() {
      setLoading(false);
      setSubmitted(true);
    });
  }

  if (submitted) {
    return h('section', {className: 'section', style: {background: 'var(--bg2)'}},
      h('div', {className: 'wrap', style: {textAlign: 'center'}},
        h('div', {style: {width: 56, height: 56, borderRadius: '50%', background: 'var(--green-bg)', border: '1px solid var(--green-border)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 18px', fontSize: 24}}, '🙏'),
        h('h2', {className: 'section-title'}, 'Thanks for sharing!'),
        h('p', {className: 'section-sub'}, "We read every response. This helps us make the webinar even more valuable for you.")
      )
    );
  }

  return h('section', {className: 'section', style: {background: 'var(--bg2)'}},
    h('div', {className: 'wrap'},
      h('h2', {className: 'section-title'}, 'One Last Thing…'),
      h('p', {className: 'section-sub', style: {marginBottom: 36}},
        'Help us make this webinar as valuable as possible for you. Takes 30 seconds.'
      ),
      h('form', {onSubmit: onSubmit, style: {maxWidth: 520, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 20}},
        h('div', null,
          h('label', {style: labelStyle}, 'Your Name'),
          h('input', {
            type: 'text', required: true, value: name,
            onChange: function(e) { setName(e.target.value); },
            placeholder: 'e.g. John Smith',
            style: inputStyle
          })
        ),
        h('div', null,
          h('label', {style: labelStyle},
            "What's the #1 thing you're struggling with when it comes to consistent enquiries?"
          ),
          h('textarea', {
            required: true, value: answer,
            onChange: function(e) { setAnswer(e.target.value); },
            placeholder: 'Share your biggest challenge…',
            rows: 5,
            style: Object.assign({}, inputStyle, {resize: 'vertical', lineHeight: 1.65})
          })
        ),
        h('button', {
          type: 'submit',
          disabled: loading,
          style: {
            background: 'var(--purple)', color: 'white',
            fontWeight: 700, fontSize: '1rem', padding: '16px 32px',
            borderRadius: 999, border: 0, cursor: loading ? 'not-allowed' : 'pointer',
            fontFamily: "'Poppins',sans-serif", opacity: loading ? 0.7 : 1,
            transition: 'opacity .2s'
          }
        }, loading ? 'Submitting…' : 'Submit My Answer →')
      )
    )
  );
}

// ── FOOTER ──
function Footer() {
  return h('footer', null,
    h('div', {className: 'footer-inner'},
      h('span', {className: 'footer-copy'}, '© 2026 One Click Digital Pty Ltd | oneclickdigital.net.au | No purchase necessary. Grand Prize requires live webinar attendance. Full T&Cs apply.'),
      h('div', {className: 'footer-links'},
        h('a', {href: '#'}, 'Giveaway T&Cs'),
        h('a', {href: '#'}, 'Privacy Policy'),
        h('a', {href: 'https://oneclickdigital.net.au', target: '_blank', rel: 'noopener noreferrer'}, 'Website')
      )
    )
  );
}

// ── APP ──
function App() {
  return h(F, null,
    h(TopBar, null),
    h(Hero, null),
    h(CalendarSection, null),
    h(VSLSection, null),
    h(SurveyForm, null),
    h(Footer, null)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
</script>
</body>
</html>
